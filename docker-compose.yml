services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    environment:
      API_HTTP_ADDR: ":8080"
      API_JWT_SECRET: "dev-secret"
      API_WORKER_TOKEN: "worker-dev-token"
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - api
    ports:
      - "5173:5173"

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    environment:
      WORKER_API_BASE_URL: "http://api:8080"
      WORKER_RUN_INTERVAL: "30s"
      WORKER_REQUEST_TIMEOUT: "5s"
      WORKER_API_TOKEN: "worker-dev-token"
      WORKER_MAX_SYNC_RETRIES: "5"
      WORKER_RETRY_BACKOFF: "2s"
    depends_on:
      - api
